<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nura Care</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              nura: {
                bg: 'var(--nura-bg)',
                card: 'var(--nura-card)',
                accent: 'var(--nura-accent)',
                text: 'var(--nura-text)',
                dim: 'var(--nura-dim)',
              }
            }
          }
        }
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
  /* Use variables so the colors can actually change! */
  body {
    font-family: 'Nunito', sans-serif;
    background-color: var(--nura-bg) !important; 
    color: var(--nura-text) !important;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    min-height: 100vh;
    transition: background-color 0.5s ease;
  }

  /* Make the cards transparent/glassy regardless of theme */
 /* Replace the .bg-nura-card block with this in your index.html */
[class*="bg-[var(--nura-card)]"] {
  background: var(--nura-card) !important;
  backdrop-filter: blur(12px) !important;
  -webkit-backdrop-filter: blur(12px) !important;
  border: 1px solid rgba(255, 255, 255, 0.1) !important;
}

  /* Scrollbar should also adapt */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--nura-bg); }
  ::-webkit-scrollbar-thumb { background: var(--nura-card); border-radius: 4px; }
    </style>

    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
      }
    }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
